<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Betaal QR</title>
  <style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  line-height: 1.5;
  padding: 1rem;
  max-width: 480px;
  margin: 0 auto;
  background: #ffffff;
  color: #1a1a1a;
}

h1 { font-size: 1.5rem; margin-bottom: 0.25rem; }
.subtitle { color: #666; font-size: 0.9rem; margin-bottom: 1.5rem; }

.container { width: 100%; }

.form-group { margin-bottom: 1rem; }
.form-group label {
  display: block;
  font-weight: 600;
  font-size: 0.85rem;
  margin-bottom: 0.25rem;
}

.required { color: #d32f2f; }
.char-count { font-weight: 400; color: #888; font-size: 0.8rem; }

textarea, input[type="text"] {
  width: 100%;
  padding: 0.5rem 0.75rem;
  border: 1px solid #ccc;
  border-radius: 6px;
  font-size: 0.95rem;
  font-family: inherit;
  transition: border-color 0.15s;
}
textarea:focus, input[type="text"]:focus {
  outline: none;
  border-color: #1a73e8;
  box-shadow: 0 0 0 2px rgba(26, 115, 232, 0.2);
}

.field-error {
  color: #d32f2f;
  font-size: 0.8rem;
  min-height: 1.2em;
  margin-top: 0.15rem;
}

.field-status {
  font-size: 0.75rem;
  min-height: 1em;
  margin-top: 0.1rem;
}
.field-status.success { color: #2e7d32; }
.field-status.partial { color: #f9a825; }
.field-status.failed  { color: #d32f2f; }

.extraction-status {
  font-size: 0.8rem;
  margin-top: 0.25rem;
  min-height: 1.2em;
}

.link-button {
  background: none;
  border: none;
  color: #1a73e8;
  cursor: pointer;
  font-size: 0.85rem;
  padding: 0;
  text-decoration: underline;
}

.hidden { display: none !important; }

.btn-primary {
  width: 100%;
  padding: 0.75rem;
  background: #1a73e8;
  color: #fff;
  border: none;
  border-radius: 6px;
  font-size: 1rem;
  font-weight: 600;
  cursor: pointer;
  margin-top: 0.5rem;
  transition: background 0.15s;
}
.btn-primary:hover:not(:disabled) { background: #1557b0; }
.btn-primary:disabled {
  background: #ccc;
  cursor: not-allowed;
}

.qr-section {
  margin-top: 1.5rem;
  text-align: center;
}
.qr-output {
  display: inline-block;
  min-width: 200px;
  min-height: 200px;
  padding: 1rem;
  background: #fff;
  border-radius: 8px;
  border: 1px solid #e0e0e0;
}
.qr-output svg {
  width: 100%;
  min-width: 200px;
  min-height: 200px;
  height: auto;
}
.qr-actions {
  margin-top: 0.75rem;
}

.btn-secondary {
  padding: 0.5rem 1rem;
  background: #f5f5f5;
  color: #333;
  border: 1px solid #ccc;
  border-radius: 6px;
  font-size: 0.85rem;
  cursor: pointer;
  transition: background 0.15s;
}
.btn-secondary:hover { background: #e8e8e8; }

.copy-feedback {
  display: inline-block;
  margin-left: 0.5rem;
  font-size: 0.8rem;
  color: #2e7d32;
  opacity: 0;
  transition: opacity 0.3s;
}
.copy-feedback.visible { opacity: 1; }

@keyframes qr-refresh {
  0%   { opacity: 1; transform: scale(1); }
  30%  { opacity: 0.55; transform: scale(0.97); }
  100% { opacity: 1; transform: scale(1); }
}
.qr-refreshing {
  animation: qr-refresh 0.35s ease-out;
}

@media (prefers-color-scheme: dark) {
  body {
    background: #1a1a1a;
    color: #e0e0e0;
  }
  .subtitle { color: #aaa; }

  textarea, input[type="text"] {
    background: #2a2a2a;
    color: #e0e0e0;
    border-color: #555;
  }
  textarea:focus, input[type="text"]:focus {
    border-color: #4da3ff;
    box-shadow: 0 0 0 2px rgba(77, 163, 255, 0.25);
  }

  .field-error { color: #ef5350; }
  .field-status.success { color: #66bb6a; }
  .field-status.partial { color: #fdd835; }
  .field-status.failed  { color: #ef5350; }

  .link-button { color: #4da3ff; }

  .btn-primary {
    background: #4da3ff;
    color: #1a1a1a;
  }
  .btn-primary:hover:not(:disabled) { background: #3d8ce6; }
  .btn-primary:disabled { background: #444; color: #888; }

  .btn-secondary {
    background: #333;
    color: #e0e0e0;
    border-color: #555;
  }
  .btn-secondary:hover { background: #444; }

  .qr-output {
    background: #ffffff;
    border-color: #555;
  }

  .copy-feedback { color: #66bb6a; }
  .char-count { color: #999; }
}
  </style>
</head>
<body>
<div class="container">
  <h1>Betaal QR</h1>
  <p class="subtitle">Plak factuurtekst, controleer de velden, genereer een betaal-QR.</p>

  <!-- Paste area -->
  <div class="form-group">
    <label for="paste-area">Plak factuurtekst</label>
    <textarea id="paste-area" rows="6" placeholder="Plak hier de tekst van je factuur of betaalmail..."></textarea>
    <div id="extraction-status" class="extraction-status"></div>
  </div>

  <!-- Extracted/editable fields -->
  <div class="form-group">
    <label for="field-iban">IBAN <span class="required">*</span></label>
    <input type="text" id="field-iban" placeholder="NL00BANK0123456789" autocomplete="off">
    <div id="iban-error" class="field-error"></div>
    <div id="iban-status" class="field-status"></div>
  </div>

  <div class="form-group">
    <label for="field-name">Naam begunstigde <span class="required">*</span></label>
    <input type="text" id="field-name" maxlength="70" placeholder="Naam van de ontvanger" autocomplete="off">
    <div id="name-status" class="field-status"></div>
  </div>

  <div class="form-group">
    <label for="field-amount">Bedrag (EUR)</label>
    <input type="text" id="field-amount" placeholder="0,00" autocomplete="off">
    <div id="amount-status" class="field-status"></div>
  </div>

  <div class="form-group">
    <label for="field-remittance">Omschrijving <span class="char-count" id="remittance-count">0/140</span></label>
    <input type="text" id="field-remittance" maxlength="140" placeholder="Factuurnummer of omschrijving" autocomplete="off">
  </div>

  <!-- BIC toggle -->
  <div class="form-group">
    <button type="button" id="bic-toggle" class="link-button">+ BIC/SWIFT toevoegen</button>
    <div id="bic-wrapper" class="hidden">
      <label for="field-bic">BIC/SWIFT</label>
      <input type="text" id="field-bic" maxlength="11" placeholder="Bijv. ABNANL2A" autocomplete="off">
    </div>
  </div>

  <!-- Generate button (hidden — auto-generate handles QR; kept as fallback code path) -->
  <button type="button" id="btn-generate" class="btn-primary hidden" disabled>Genereer QR Code</button>

  <!-- QR output area -->
  <div id="qr-section" class="qr-section hidden">
    <div id="qr-output" class="qr-output"></div>
    <div id="qr-actions" class="qr-actions">
      <button type="button" id="btn-copy" class="btn-secondary">Kopieer QR naar klembord</button>
      <span id="copy-feedback" class="copy-feedback"></span>
    </div>
  </div>
</div>

<script src="lib/qrcode.js"></script>
<script src="lib/qrcode_UTF8.js"></script>

<script>
// =============================================================================
// Phase 1: Core extraction and validation functions
// All functions are pure (no DOM access, no side effects, no network calls).
// Accessible from the browser console at window scope.
// =============================================================================

/**
 * Normalizes raw copy-pasted text by removing/replacing Unicode artifacts.
 * @param {string} raw
 * @returns {string}
 */
function normalizeText(raw) {
  return raw
    .replace(/\u00A0/g, ' ')          // non-breaking space -> regular space
    .replace(/\u00AD/g, '')            // soft hyphen -> remove
    .replace(/[\u2013\u2014]/g, '-')   // en-dash, em-dash -> ASCII hyphen
    .replace(/\u200B/g, '')            // zero-width space -> remove
    .trim();
}

/**
 * Validates an IBAN string using the ISO 13616 MOD-97 algorithm.
 * @param {string} iban - Normalized IBAN (no spaces, uppercase)
 * @returns {boolean}
 */
function validateIBAN(iban) {
  // Rearrange: move first 4 chars to end
  var rearranged = iban.slice(4) + iban.slice(0, 4);
  // Convert letters to digits: A=10, B=11, ..., Z=35
  var digits = rearranged.split('').map(function(ch) {
    var code = ch.charCodeAt(0);
    return (code >= 65 && code <= 90) ? String(code - 55) : ch;
  }).join('');
  // Iterative mod-97 (avoids BigInt requirements)
  var remainder = 0;
  for (var i = 0; i < digits.length; i++) {
    remainder = (remainder * 10 + parseInt(digits[i], 10)) % 97;
  }
  return remainder === 1;
}

/**
 * Extracts the first valid IBAN from text (space-tolerant, MOD-97 validated).
 * @param {string} text
 * @returns {string|null}
 */
function extractIBAN(text) {
  var normalized = normalizeText(text);
  // Allow optional spaces between IBAN groups (common Dutch invoice format)
  var pattern = /\b([A-Z]{2}\d{2}(?:\s?[A-Z0-9]{4}){3,7}\s?[A-Z0-9]{0,3})\b/gi;
  var candidates = [];
  var m;
  while ((m = pattern.exec(normalized.toUpperCase())) !== null) {
    var candidate = m[1].replace(/\s/g, '').toUpperCase();
    if (candidate.length >= 15 && candidate.length <= 34) {
      candidates.push(candidate);
    }
  }
  // Return first MOD-97 valid candidate (per user constraint: first one wins)
  for (var j = 0; j < candidates.length; j++) {
    if (validateIBAN(candidates[j])) {
      return candidates[j];
    }
  }
  return null;
}

/**
 * Parses an amount string, handling both Dutch (1.234,56) and English (1,234.56) locales.
 * @param {string} s
 * @returns {number|null}
 */
function parseAmountString(s) {
  var lastComma = s.lastIndexOf(',');
  var lastDot   = s.lastIndexOf('.');
  var normalized;
  if (lastComma > lastDot) {
    // Dutch locale: comma is decimal separator (e.g. 1.234,56)
    normalized = s.replace(/\./g, '').replace(',', '.');
  } else {
    // English locale: dot is decimal separator (e.g. 1,234.56)
    normalized = s.replace(/,/g, '');
  }
  var value = parseFloat(normalized);
  if (isNaN(value) || value < 0.01 || value > 999999999.99) return null;
  return Math.round(value * 100) / 100; // avoid float drift
}

/**
 * Extracts the payment amount from text, anchored to currency signals.
 * Prefers the last valid match (invoice totals appear at the bottom).
 * @param {string} text
 * @returns {number|null}
 */
function extractAmount(text) {
  var normalized = normalizeText(text);
  var pattern = /(?:€|EUR|euro)\s*([\d.,]+)|(?:te\s+betalen|totaal|total|bedrag|amount\s+due)\s*:?\s*([\d.,]+)/gi;
  var lastMatch = null;
  var m;
  while ((m = pattern.exec(normalized)) !== null) {
    var raw = (m[1] || m[2]).trim();
    var value = parseAmountString(raw);
    if (value !== null) lastMatch = value;
  }
  return lastMatch;
}

/**
 * Extracts the beneficiary name from text using Dutch label heuristics and
 * IBAN proximity as fallback. Enforces the 70-character EPC limit (FLDS-03).
 * @param {string} text
 * @param {number} [ibanIndex] - Character index of the IBAN in the original text (optional)
 * @returns {string|null}
 */
function extractName(text, ibanIndex) {
  var normalized = normalizeText(text);

  // Step 1 — Label matching (Dutch and English label heuristics)
  var labelPattern = /(?:t\.?\s?n\.?\s?v\.?|begunstigde|ten\s+name\s+van|naam|name|beneficiary)\s*:?\s*(.+)/gi;
  var m;
  while ((m = labelPattern.exec(normalized)) !== null) {
    var capture = m[1].trim();
    if (capture) {
      return capture.substring(0, 70);
    }
  }

  // Step 2 — IBAN proximity fallback: look at the line immediately before the IBAN
  if (ibanIndex !== undefined && ibanIndex !== null) {
    var textBefore = normalized.substring(0, ibanIndex);
    var lines = textBefore.split('\n');
    // Walk backwards to find the last non-empty line
    for (var i = lines.length - 1; i >= 0; i--) {
      var line = lines[i].trim();
      if (!line) continue;
      // Skip lines that look like labels rather than names
      var looksLikeLabel = /^(rekeningnummer|iban|bic|swift|bank|rekening)\s*:?$/i.test(line);
      var hasOnlyColon = /^[^a-z0-9]*:?\s*$/i.test(line);
      if (!looksLikeLabel && !hasOnlyColon) {
        return line.substring(0, 70);
      }
      break;
    }
  }

  // Step 3 — Nothing found; user will edit in Phase 2
  return null;
}

// =============================================================================
// EPC payload assembly, validation, and orchestrator
// =============================================================================

/**
 * Formats an EPC QR payload string (EPC069-12 v3.1, exactly 12 lines, LF-separated).
 *
 * All 12 lines are always emitted. The EPC spec defines 12 fixed-position data
 * objects; strict bank parsers (e.g. ASN Bank / de Volksbank) index fields by
 * line number and reject payloads that have fewer than 12 lines. Lenient parsers
 * (e.g. Bunq) accept shorter payloads — always emitting 12 lines satisfies both.
 *
 * No trailing \n after line 12 (last element has no following separator per spec).
 *
 * @param {{ iban: string, name: string, amount: number|null, bic?: string, remittance?: string }} fields
 * @returns {string}
 */
function formatEPCPayload(fields) {
  var iban = fields.iban, name = fields.name, amount = fields.amount;
  var bic = fields.bic || '', remittance = fields.remittance || '';
  if (!iban || !name) throw new Error('IBAN and name are required');
  var lines = [
    'BCD',                                                    // Line 1: Service tag
    '002',                                                    // Line 2: Version (BIC optional)
    '1',                                                      // Line 3: Character set UTF-8
    'SCT',                                                    // Line 4: SEPA Credit Transfer
    bic.trim().substring(0, 11),                              // Line 5: BIC (blank = omitted)
    name.substring(0, 70),                                    // Line 6: Beneficiary name
    iban.replace(/\s/g, '').toUpperCase(),                    // Line 7: Beneficiary IBAN
    amount != null ? 'EUR' + amount.toFixed(2) : '',          // Line 8: Amount (blank if unknown)
    '',                                                       // Line 9: Purpose code (blank)
    '',                                                       // Line 10: Structured remittance (blank)
    remittance.substring(0, 140),                             // Line 11: Unstructured remittance
    ''                                                        // Line 12: Originator info (blank)
  ];
  // Always join all 12 lines — do NOT strip trailing empty fields.
  // Strict EPC parsers (ASN Bank, de Volksbank) index fields by line number;
  // omitting trailing lines causes those parsers to reject the QR code.
  return lines.join('\n');
}

/**
 * Validates an EPC payload string (byte count, header check).
 * @param {string} payload
 * @returns {{ valid: boolean, byteCount: number, errors: string[] }}
 */
function validateEPCPayload(payload) {
  var byteCount = new TextEncoder().encode(payload).length;
  var errors = [];
  if (byteCount > 331) {
    errors.push('Payload exceeds 331-byte EPC limit (' + byteCount + ' bytes)');
  }
  if (!payload.startsWith('BCD\n002\n1\nSCT\n')) {
    errors.push('Invalid EPC header');
  }
  return { valid: byteCount <= 331 && errors.length === 0, byteCount: byteCount, errors: errors };
}

/**
 * Renders an EPC payload string as an SVG QR code into a container element.
 * @param {string} payloadString
 * @param {Element} [containerElement] - defaults to #qr-output
 * @returns {string} SVG markup
 */
function renderQR(payloadString, containerElement) {
  if (!containerElement) {
    containerElement = document.getElementById('qr-output');
  }
  var qr = qrcode(0, 'M');  // typeNumber 0 = auto-detect; ECC level M
  qr.addData(payloadString, 'Byte');  // Force byte mode for EPC QR spec compliance
  qr.make();
  containerElement.innerHTML = qr.createSvgTag({ cellSize: 2, margin: 4, scalable: true });
  return containerElement.innerHTML;
}

/**
 * Orchestrates extraction: normalizes text, extracts IBAN, amount, and name.
 * @param {string} text
 * @returns {{ iban: string|null, name: string|null, amount: number|null }}
 */
function parsePaymentText(text) {
  var normalized = normalizeText(text);
  var iban = extractIBAN(normalized);
  var amount = extractAmount(normalized);
  var ibanIndex = iban ? normalized.toUpperCase().indexOf(iban.substring(0, 4)) : -1;
  var name = extractName(normalized, ibanIndex);
  return { iban: iban, name: name, amount: amount };
}

// =============================================================================
// Test harness — call runTests() from the browser console
// =============================================================================

function runTests() {
  var passed = 0, failed = 0;

  function assert(label, actual, expected) {
    if (actual === expected) {
      console.log('PASS: ' + label);
      passed++;
    } else {
      console.error('FAIL: ' + label + ' — expected ' + JSON.stringify(expected) + ', got ' + JSON.stringify(actual));
      failed++;
    }
  }

  // --- normalizeText ---
  assert('normalize nbsp',        normalizeText('hello\u00A0world'), 'hello world');
  assert('normalize zero-width',  normalizeText('test\u200Bvalue'),  'testvalue');
  assert('normalize soft-hyphen', normalizeText('co\u00ADop'),       'coop');
  assert('normalize en-dash',     normalizeText('2024\u20132025'),    '2024-2025');

  // --- validateIBAN ---
  assert('valid NL IBAN',                   validateIBAN('NL91ABNA0417164300'),     true);
  assert('invalid NL IBAN (wrong check)',   validateIBAN('NL00ABNA0417164300'),     false);
  assert('valid DE IBAN',                   validateIBAN('DE89370400440532013000'), true);

  // --- extractIBAN ---
  assert('IBAN with spaces',    extractIBAN('Rekening: NL91 ABNA 0417 1643 00'), 'NL91ABNA0417164300');
  assert('IBAN no spaces',      extractIBAN('IBAN: NL91ABNA0417164300'),          'NL91ABNA0417164300');
  assert('no IBAN in text',     extractIBAN('Just some random text here'),        null);
  assert('invalid IBAN skipped',
    extractIBAN('NL00ABNA0417164300 and NL91ABNA0417164300'),
    'NL91ABNA0417164300'
  );

  // --- extractAmount ---
  assert('Dutch locale EUR',  extractAmount('Totaal: EUR 1.234,56'),              1234.56);
  assert('Euro sign',         extractAmount('Te betalen: \u20AC99,95'),           99.95);
  assert('English locale',    extractAmount('Amount due: 1,234.56'),              1234.56);
  assert('Plain EUR',         extractAmount('EUR 100'),                           100);
  assert('no amount',         extractAmount('No numbers related to payment'),     null);

  // --- extractName ---
  assert('t.n.v. label',       extractName('t.n.v. Acme B.V.'),              'Acme B.V.');
  assert('begunstigde label',  extractName('Begunstigde: Jan de Vries'),      'Jan de Vries');
  assert('no name found',      extractName('Just some random text'),          null);
  assert('name truncated to 70',
    extractName('naam: ' + 'A'.repeat(80)).length,
    70
  );

  // --- formatEPCPayload ---
  // Always exactly 12 lines (11 \n separators), no trailing \n after last field.
  // Strict bank parsers (ASN Bank / de Volksbank) index fields by line number and
  // reject payloads with fewer than 12 lines. All trailing empty lines are kept.
  assert('EPC always 12 lines (no remittance)', formatEPCPayload({iban:'NL91ABNA0417164300', name:'Acme B.V.', amount:100}).split('\n').length, 12);
  assert('EPC always 12 lines (null amount)',   formatEPCPayload({iban:'NL91ABNA0417164300', name:'Acme B.V.', amount:null}).split('\n').length, 12);
  assert('EPC starts with BCD', formatEPCPayload({iban:'NL91ABNA0417164300', name:'Acme B.V.', amount:100}).split('\n')[0], 'BCD');
  assert('EPC version 002',     formatEPCPayload({iban:'NL91ABNA0417164300', name:'Acme B.V.', amount:100}).split('\n')[1], '002');
  assert('EPC charset UTF-8',   formatEPCPayload({iban:'NL91ABNA0417164300', name:'Acme B.V.', amount:100}).split('\n')[2], '1');
  assert('EPC SCT',             formatEPCPayload({iban:'NL91ABNA0417164300', name:'Acme B.V.', amount:100}).split('\n')[3], 'SCT');
  assert('EPC amount format',   formatEPCPayload({iban:'NL91ABNA0417164300', name:'Acme B.V.', amount:100}).split('\n')[7], 'EUR100.00');
  assert('EPC null amount omitted', formatEPCPayload({iban:'NL91ABNA0417164300', name:'Acme B.V.', amount:null}).indexOf('EUR'), -1);
  // Note: with 12 fixed lines and empty line 12, payload ends with \n (line 12 = empty string after final separator).
  // This matches the derhuerst reference implementation and is accepted by all EPC-compatible bank apps.
  assert('EPC no CRLF-style trailing newline', formatEPCPayload({iban:'NL91ABNA0417164300', name:'Acme B.V.', amount:100}).endsWith('\r\n'), false);
  assert('EPC no CRLF',         formatEPCPayload({iban:'NL91ABNA0417164300', name:'Acme B.V.', amount:100}).indexOf('\r'), -1);

  // --- validateEPCPayload ---
  assert('EPC valid payload',    validateEPCPayload(formatEPCPayload({iban:'NL91ABNA0417164300', name:'Acme B.V.', amount:100})).valid, true);
  assert('EPC byte count type',  typeof validateEPCPayload(formatEPCPayload({iban:'NL91ABNA0417164300', name:'Acme B.V.', amount:100})).byteCount, 'number');

  // --- parsePaymentText ---
  assert('parse full text IBAN',   parsePaymentText('Betaal aan NL91 ABNA 0417 1643 00 bedrag EUR 50,00').iban, 'NL91ABNA0417164300');
  assert('parse full text amount', parsePaymentText('Betaal aan NL91 ABNA 0417 1643 00 bedrag EUR 50,00').amount, 50);

  // --- QR library and end-to-end ---
  assert('QR library loaded', typeof qrcode, 'function');
  var svgOutput = renderQR(formatEPCPayload({iban:'NL91ABNA0417164300', name:'Acme B.V.', amount:25.50}));
  assert('renderQR produces SVG', svgOutput.indexOf('<svg') !== -1, true);

  console.log('\n' + passed + ' passed, ' + failed + ' failed');
  return { passed: passed, failed: failed };
}

// Run tests: open browser console and type runTests()

// =============================================================================
// Phase 2: UI wiring — event handlers, validation, QR generation
// =============================================================================

(function initUI() {
  var pasteArea = document.getElementById('paste-area');
  var fieldIBAN = document.getElementById('field-iban');
  var fieldName = document.getElementById('field-name');
  var fieldAmount = document.getElementById('field-amount');
  var fieldRemittance = document.getElementById('field-remittance');
  var fieldBIC = document.getElementById('field-bic');
  var bicToggle = document.getElementById('bic-toggle');
  var bicWrapper = document.getElementById('bic-wrapper');
  var btnGenerate = document.getElementById('btn-generate');
  var qrSection = document.getElementById('qr-section');
  var qrOutput = document.getElementById('qr-output');
  var extractionStatus = document.getElementById('extraction-status');
  var ibanError = document.getElementById('iban-error');
  var ibanStatus = document.getElementById('iban-status');
  var nameStatus = document.getElementById('name-status');
  var amountStatus = document.getElementById('amount-status');
  var remittanceCount = document.getElementById('remittance-count');

  // --- Three-state extraction feedback ---
  function setFieldStatus(statusEl, state, message) {
    statusEl.textContent = message || '';
    statusEl.className = 'field-status';
    if (state) statusEl.classList.add(state);
  }

  function updateExtractionStatus(result) {
    var allSuccess = true;
    var anySuccess = false;

    // IBAN status
    if (result.iban) {
      setFieldStatus(ibanStatus, 'success', 'IBAN gevonden');
      anySuccess = true;
    } else {
      setFieldStatus(ibanStatus, 'failed', 'Geen IBAN gevonden');
      allSuccess = false;
    }

    // Name status
    if (result.name) {
      setFieldStatus(nameStatus, 'success', 'Naam gevonden');
      anySuccess = true;
    } else {
      setFieldStatus(nameStatus, 'failed', 'Geen naam gevonden');
      allSuccess = false;
    }

    // Amount status
    if (result.amount !== null) {
      setFieldStatus(amountStatus, 'success', 'Bedrag gevonden');
      anySuccess = true;
    } else {
      setFieldStatus(amountStatus, 'partial', 'Geen bedrag gevonden — vul handmatig in');
      allSuccess = false;
    }

    // Overall extraction status
    if (allSuccess) {
      extractionStatus.textContent = 'Alle velden automatisch ingevuld';
      extractionStatus.className = 'extraction-status';
      extractionStatus.style.color = '#2e7d32';
    } else if (anySuccess) {
      extractionStatus.textContent = 'Gedeeltelijk herkend — controleer de velden';
      extractionStatus.className = 'extraction-status';
      extractionStatus.style.color = '#f9a825';
    } else {
      extractionStatus.textContent = 'Geen betaalgegevens herkend';
      extractionStatus.className = 'extraction-status';
      extractionStatus.style.color = '#d32f2f';
    }
  }

  // --- Paste/input handler: auto-extract ---
  function handlePaste() {
    var text = pasteArea.value.trim();
    if (!text) {
      fieldIBAN.value = '';
      fieldName.value = '';
      fieldAmount.value = '';
      extractionStatus.textContent = '';
      ibanStatus.textContent = '';
      nameStatus.textContent = '';
      amountStatus.textContent = '';
      ibanError.textContent = '';
      updateGenerateButton();
      return;
    }

    var result = parsePaymentText(text);

    // Populate fields
    fieldIBAN.value = result.iban || '';
    fieldName.value = result.name || '';
    fieldAmount.value = result.amount !== null ? result.amount.toFixed(2).replace('.', ',') : '';

    // Show extraction feedback
    updateExtractionStatus(result);

    // Validate IBAN if extracted
    validateIBANField();
    updateGenerateButton();
    autoGenerate();
  }

  pasteArea.addEventListener('input', handlePaste);
  // Also handle paste event for immediate response (input fires after paste completes)
  pasteArea.addEventListener('paste', function() {
    setTimeout(handlePaste, 0);
  });

  // --- IBAN inline validation ---
  function validateIBANField() {
    var val = fieldIBAN.value.replace(/\s/g, '').toUpperCase();
    if (!val) {
      ibanError.textContent = '';
      return false;
    }
    // Basic format check
    if (!/^[A-Z]{2}\d{2}[A-Z0-9]{11,30}$/.test(val)) {
      ibanError.textContent = 'Ongeldig IBAN-formaat';
      return false;
    }
    if (!validateIBAN(val)) {
      ibanError.textContent = 'IBAN controlesom klopt niet (MOD-97)';
      return false;
    }
    ibanError.textContent = '';
    return true;
  }

  fieldIBAN.addEventListener('input', function() {
    validateIBANField();
    updateGenerateButton();
    autoGenerate();
  });

  // --- Name field listener ---
  fieldName.addEventListener('input', function() {
    updateGenerateButton();
    autoGenerate();
  });

  // --- Amount field listener ---
  fieldAmount.addEventListener('input', function() {
    updateGenerateButton();
    autoGenerate();
  });

  // --- Remittance character counter ---
  fieldRemittance.addEventListener('input', function() {
    remittanceCount.textContent = fieldRemittance.value.length + '/140';
    autoGenerate();
  });

  // --- BIC field listener ---
  fieldBIC.addEventListener('input', function() {
    autoGenerate();
  });

  // --- BIC toggle ---
  bicToggle.addEventListener('click', function() {
    var isHidden = bicWrapper.classList.contains('hidden');
    if (isHidden) {
      bicWrapper.classList.remove('hidden');
      bicToggle.textContent = '- BIC/SWIFT verbergen';
      fieldBIC.focus();
    } else {
      bicWrapper.classList.add('hidden');
      bicToggle.textContent = '+ BIC/SWIFT toevoegen';
    }
  });

  // --- Generate button state ---
  function updateGenerateButton() {
    var ibanVal = fieldIBAN.value.replace(/\s/g, '').toUpperCase();
    var nameVal = fieldName.value.trim();
    var ibanValid = ibanVal.length > 0 && validateIBAN(ibanVal);
    var namePresent = nameVal.length > 0;
    btnGenerate.disabled = !(ibanValid && namePresent);
  }

  // --- Auto-generate with debounce ---
  var autoGenerateTimer = null;

  function autoGenerate() {
    clearTimeout(autoGenerateTimer);
    autoGenerateTimer = setTimeout(function() {
      var ibanVal = fieldIBAN.value.replace(/\s/g, '').toUpperCase();
      var nameVal = fieldName.value.trim();
      // Only auto-generate when minimum required fields are valid
      if (!validateIBAN(ibanVal) || !nameVal) return;

      var amountStr = fieldAmount.value.trim();
      var remittance = fieldRemittance.value.trim();
      var bic = fieldBIC ? fieldBIC.value.trim() : '';
      var amount = amountStr ? parseAmountString(amountStr) : null;

      try {
        var payload = formatEPCPayload({ iban: ibanVal, name: nameVal, amount: amount, bic: bic, remittance: remittance });
        var validation = validateEPCPayload(payload);
        if (!validation.valid) return; // silently skip if payload exceeds limits

        // Flash animation to signal QR updated
        qrOutput.classList.remove('qr-refreshing');
        // Force reflow so removing+re-adding the class triggers the animation
        void qrOutput.offsetWidth;
        qrOutput.classList.add('qr-refreshing');

        renderQR(payload, qrOutput);
        qrSection.classList.remove('hidden');
      } catch (e) {
        // Swallow errors during auto-generate; user can still press the button for an explicit error message
      }
    }, 600); // 600ms debounce — feels instant after a natural pause, not nauseating on keydown
  }

  // --- Generate QR ---
  btnGenerate.addEventListener('click', function() {
    var ibanVal = fieldIBAN.value.replace(/\s/g, '').toUpperCase();
    var nameVal = fieldName.value.trim();
    var amountStr = fieldAmount.value.trim();
    var remittance = fieldRemittance.value.trim();
    var bic = fieldBIC ? fieldBIC.value.trim() : '';

    // Parse amount: handle both comma and dot as decimal separator
    var amount = null;
    if (amountStr) {
      amount = parseAmountString(amountStr);
    }

    try {
      var payload = formatEPCPayload({
        iban: ibanVal,
        name: nameVal,
        amount: amount,
        bic: bic,
        remittance: remittance
      });

      var validation = validateEPCPayload(payload);
      if (!validation.valid) {
        alert('EPC payload ongeldig: ' + validation.errors.join(', '));
        return;
      }

      renderQR(payload, qrOutput);
      qrSection.classList.remove('hidden');
    } catch (e) {
      alert('Fout bij genereren: ' + e.message);
    }
  });

  // --- Copy QR to clipboard ---
  var btnCopy = document.getElementById('btn-copy');
  var copyFeedback = document.getElementById('copy-feedback');

  btnCopy.addEventListener('click', function() {
    var svgEl = qrOutput.querySelector('svg');
    if (!svgEl) return;

    // Convert SVG to canvas to blob for clipboard
    var svgData = new XMLSerializer().serializeToString(svgEl);
    var svgBlob = new Blob([svgData], { type: 'image/svg+xml;charset=utf-8' });
    var url = URL.createObjectURL(svgBlob);
    var img = new Image();
    img.onload = function() {
      var canvas = document.createElement('canvas');
      // Render at 400x400 for good quality
      canvas.width = 400;
      canvas.height = 400;
      var ctx = canvas.getContext('2d');
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, 400, 400);
      ctx.drawImage(img, 0, 0, 400, 400);
      URL.revokeObjectURL(url);

      canvas.toBlob(function(blob) {
        if (!blob) {
          copyFeedback.textContent = 'Kopiëren mislukt';
          copyFeedback.classList.add('visible');
          setTimeout(function() { copyFeedback.classList.remove('visible'); }, 2000);
          return;
        }
        navigator.clipboard.write([
          new ClipboardItem({ 'image/png': blob })
        ]).then(function() {
          copyFeedback.textContent = 'Gekopieerd!';
          copyFeedback.classList.add('visible');
          setTimeout(function() { copyFeedback.classList.remove('visible'); }, 2000);
        }).catch(function() {
          copyFeedback.textContent = 'Kopiëren mislukt — probeer rechtermuisklik';
          copyFeedback.classList.add('visible');
          setTimeout(function() { copyFeedback.classList.remove('visible'); }, 3000);
        });
      }, 'image/png');
    };
    img.src = url;
  });
})();
</script>
</body>
</html>
